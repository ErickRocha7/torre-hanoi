plugins {
    id 'application'
    id 'org.openjfx.javafxplugin' version '0.1.0'
}

repositories {
    mavenCentral()
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

javafx {
    version = "21"
    modules = [ 'javafx.controls' ]
}

application {
    mainClass = 'com.hanoi.Main'
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
}